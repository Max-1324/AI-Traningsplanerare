name: Morgon träningsplan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python training_plan_generator.py --auto
        env:
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: gemini
            # Skriv listan i den ordning du vill att AI:n ska testas (prio 1 först)
          GEMINI_MODELS: "gemini-3-flash-preview, gemini-3.1-flash-lite-preview, gemini-2.5-flash"
          ATHLETE_LAT: ${{ secrets.ATHLETE_LAT }}
          ATHLETE_LON: ${{ secrets.ATHLETE_LON }}
          ATHLETE_LOCATION: ${{ secrets.ATHLETE_LOCATION }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
